name: API Tests

on:
  push:
    branches: [main, master]
    paths:
      - "tests/**"
      - "schemas/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/api-tests.yml"
  pull_request:
    paths:
      - "tests/**"
      - "schemas/**"
      - "requirements.txt"
      - "pytest.ini"
  workflow_dispatch:
    inputs:
      markers:
        description: "pytest -m ifadesi (bos = tumu)"
        required: false
        default: ""
  schedule:
    # Her gun 06:00 UTC (09:00 TR) — canli ortam regresyon/servis kontrolu
    - cron: "0 6 * * *"

# Ayni dal icin eski kosumlari iptal et
concurrency:
  group: api-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # BASE_URL'i repo Variables'tan al; tanimli degilse calisan adrese dus
      BASE_URL: ${{ vars.BASE_URL || 'https://api-v2.nadirgold.dev' }}
      TIMEOUT: "20"
      # Opsiyonel hazir hesap (yoksa suite kendi hesabini register eder)
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      TEST_SKU: ${{ vars.TEST_SKU || 'ALTIN-GRAM-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          mkdir -p reports
          pytest \
            ${{ github.event.inputs.markers && format('-m "{0}"', github.event.inputs.markers) || '' }} \
            --junitxml=reports/junit.xml \
            -rsxX

      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit.xml
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/report.html
            reports/junit.xml
          if-no-files-found: warn
          retention-days: 30
