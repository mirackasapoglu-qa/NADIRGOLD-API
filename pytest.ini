[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
markers =
    smoke: hizli dogrulama testleri (kritik endpointler)
    auth: kimlik dogrulama gerektiren testler
    negative: hata / gecersiz girdi senaryolari
    schema: yanit sema dogrulama testleri
    boundary: sinir deger / idempotency / buyuk payload / unicode-emoji testleri
    security: OWASP API guvenlik farkindaligi (BOLA, kirik auth, metot, injection, rate-limit)
